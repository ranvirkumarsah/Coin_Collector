name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev tcl-dev tk-dev libgdbm-dev libsqlite3-dev libbffi-dev libgstreamer1.0-dev libpango1.0-dev setuptools

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK with Buildozer
        run: |
          # Safe execution for automated headless environments
          YES=1 buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoinCollector-Android-APK
          path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/coincollector/build/outputs/apk/debug/*.apk
