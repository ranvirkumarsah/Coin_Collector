name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Fixed typo: changed libbffi-dev to libffi-dev
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev tcl-dev tk-dev libgdbm-dev libsqlite3-dev libffi-dev libgstreamer1.0-dev libpango1.0-dev
          pip install setuptools

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK with Buildozer
        run: |
          # Safe execution for automated headless environments
          yes | buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoinCollector-Android-APK
          # Matches the dynamic build output architecture directory exactly
          path: bin/*.apk
